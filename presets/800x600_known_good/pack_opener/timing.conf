# Pack opener timing — calibrated for 800x600 Gamescope window.
# These timings work on the machine this preset was built on.
# If the macro runs too fast or too slow for your hardware, adjust these values.
BASE_PRESS_COUNT_NORMAL=3
BASE_PRESS_COUNT_AFTER_HANDOFF=10
BASE_PRESS_DELAY=5ms
POST_BASE_WAIT=1ms

PLACE_FORWARD_DURATION=1s700ms
PLACE_LEFT_DURATION=1s100ms
PLACE_LIVE_CLICK_INTERVAL=1ms
PLACE_LIVE_CLICK_BURST_DELAY=8ms
PLACE_LIVE_CLICK_BURST_SAFETY_MARGIN=20ms
PLACE_LIVE_CLICK_BURST_CHUNK_MS=120ms
PLACE_LIVE_E_INTERVAL=80ms
PLACE_LIVE_E_CHUNK_MS=40ms
PLACE_LIVE_E_ENABLED=1
PLACE_LIVE_CLICK_WORKER_CHUNK_MS=120ms
PLACE_LIVE_E_WORKER_CHUNK_MS=80ms
PLACE_LIVE_WORKER_STOP_GRACE_MS=50ms

POST_PLACE_WAIT=1ms
POST_SECOND_BASE_WAIT=1ms
POTION_PRE_MENU_CLICK_WAIT=0ms
POST_INVENTORY_OPEN_WAIT=55ms
POST_POTION_SEQUENCE_WAIT=1ms

# Historical / do not use initially unless separately validated:
OPEN_FORWARD_DURATION=2s
OPEN_LEFT_DURATION=1s

POTION_PROFILE=MANUAL_FAST_NAV_BATCH_TEST
POTION_PLAN_ENABLED=1

POTION_2_MIN_ENABLED=1
POTION_2_MIN_USE_10X_COUNT=4
POTION_2_MIN_USE_SINGLE_COUNT=0

POTION_6_MIN_ENABLED=0
POTION_6_MIN_USE_10X_COUNT=0
POTION_6_MIN_USE_SINGLE_COUNT=0

POTION_15_MIN_ENABLED=0
POTION_15_MIN_USE_10X_COUNT=0
POTION_15_MIN_USE_SINGLE_COUNT=0

POST_POTION_SELECT_WAIT=1ms
POST_POTION_TIER_WAIT=1ms

POTION_CLICK_BACKEND=batch
POTION_CLICK_BATCH_PRIME=move
POTION_NAV_CLICK_BACKEND=fast
POTION_NAV_CLICK_PRIME=move
POTION_NAV_CLICK_DELAY=30ms
USE_CLICK_DELAY=50ms
POTION_USE_BURST_PRE_DELAY=0ms
CLOSE_INVENTORY=1

PACK_FLOW_BACKEND=self_correcting
PACK_FIRST_RUN_MODE=place_only
PACK_CLICK_POINT=PACK_CLICK_POINT
PACK_PLACE_CLICK_INTERVAL=1ms
PACK_OPEN_E_INTERVAL=10ms
PACK_FINAL_MOUSE_CLICK_BEFORE_BASE=1
PACK_RESUME_REQUIRES_PLACE_ONLY=1
PACK_AUTOCLICK_BACKEND=chunked
