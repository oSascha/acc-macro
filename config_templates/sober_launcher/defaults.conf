# Sober Instance Launcher — template defaults
# Copy to runtime_config/sober_launcher/defaults.conf and configure.
# URLs containing & must be single-quoted: SOBER_PRIVATE_SERVER_URL='https://...&type=Server'
# NEVER commit runtime_config/sober_launcher/defaults.conf — it may contain a private URL.
SOBER_LAUNCHER_ENABLED=1
SOBER_PRIVATE_SERVER_URL=
SOBER_LAUNCH_WIDTH=800
SOBER_LAUNCH_HEIGHT=600
SOBER_LAUNCH_REFRESH=60
SOBER_LAUNCH_GAMESCOPE_ARGS=
SOBER_FLATPAK_APP_ID=org.vinegarhq.Sober
SOBER_LAUNCH_LOG=runtime_config/sober_launcher/launcher.log
SOBER_LAUNCH_PID_FILE=runtime_config/sober_launcher/pids.env
SOBER_PRIVATE_OPEN_METHOD=xdg-open
# SOBER_PRIVATE_OPEN_WAIT_SECONDS is no longer used. The private-server browser
# handoff (roblox-player URI -> sober-gamescope-url) launches Sober directly;
# starting Sober first and then waiting would cause a double launch.
SOBER_PRIVATE_OPEN_WAIT_SECONDS=10
SOBER_PRIVATE_OPEN_LOG=runtime_config/sober_launcher/private_open.log
